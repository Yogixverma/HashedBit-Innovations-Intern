<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProCalc Engine</title>
    <style>
        body {
            background: radial-gradient(circle at top, #1e1b4b 0%, #09090b 100%);
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-sizing: border-box;
        }
        .calc-wrapper {
            width: 100%;
            max-width: 520px;
            background-color: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 0 0 50px rgba(99, 102, 241, 0.15);
            box-sizing: border-box;
        }
        .header-zone {
            margin-bottom: 2.25rem;
            text-align: center;
        }
        .main-title {
            color: #ffffff;
            margin: 0;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .brand-highlight {
            color: #6366f1;
        }
        .subtitle-text {
            color: #64748b;
            margin: 0.5rem 0 0 0;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .input-fields-group {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .field-label {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-left: 0.25rem;
        }
        .num-input {
            width: 100%;
            padding: 0.95rem 1.25rem;
            border-radius: 12px;
            border: 1px solid #334155;
            background-color: #09090b;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 500;
            outline: none;
            box-sizing: border-box;
        }
        .num-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }
        .actions-layout-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.75rem;
            margin-bottom: 2.25rem;
        }
        .op-btn {
            background-color: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: #f8fafc;
            border-radius: 12px;
            padding: 0.9rem 0;
            font-size: 1.4rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .op-btn:hover {
            background-color: #4f46e5;
            color: #ffffff;
        }
        .clear-btn {
            background-color: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: #f43f5e;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .clear-btn:hover {
            background-color: #e11d48;
            color: #ffffff;
        }
        .output-box {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.7) 100%);
            border: 1px dashed #334155;
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            min-height: 85px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .output-box.active-result {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1) 0%, rgba(17, 24, 39, 0.8) 100%);
            border: 1px solid #6366f1;
        }
        .output-label {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 0.5rem 0;
        }
        .output-value {
            color: #cbd5e1;
            font-size: 1.2rem;
            font-weight: 500;
            margin: 0;
        }
        .output-box.active-result .output-value {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>

    <div class="calc-wrapper">
        <div class="header-zone">
            <h1 class="main-title">ProCalc <span class="brand-highlight">Engine</span></h1>
            <p class="subtitle-text">React Component Standalone Architecture</p>
        </div>
        
        <div class="input-fields-group">
            <div class="input-wrapper">
                <label class="field-label">Input Parameter A</label>
                <input type="number" id="num1" placeholder="0" class="num-input">
            </div>
            <div class="input-wrapper">
                <label class="field-label">Input Parameter B</label>
                <input type="number" id="num2" placeholder="0" class="num-input">
            </div>
        </div>

        <div class="actions-layout-grid">
            <button class="op-btn" onclick="executeOperation('+')">+</button>
            <button class="op-btn" onclick="executeOperation('-')">−</button>
            <button class="op-btn" onclick="executeOperation('*')">×</button>
            <button class="op-btn" onclick="executeOperation('/')">÷</button>
            <button class="op-btn clear-btn" onclick="clearFields()">C</button>
        </div>

        <div id="outputContainer" class="output-box">
            <p class="output-label">Computed Result Matrix</p>
            <p id="resultDisplay" class="output-value">Awaiting parameters...</p>
        </div>
    </div>

    <script>
        function executeOperation(operator) {
            var val1 = document.getElementById('num1').value;
            var val2 = document.getElementById('num2').value;
            var outputContainer = document.getElementById('outputContainer');
            var resultDisplay = document.getElementById('resultDisplay');

            if (val1 === '' || val2 === '') {
                outputContainer.classList.remove('active-result');
                resultDisplay.innerText = "Please fill both input fields.";
                resultDisplay.style.color = "#f43f5e";
                return;
            }

            var n1 = parseFloat(val1);
            var n2 = parseFloat(val2);
            var calculationResult = 0;

            if (operator === '+') calculationResult = n1 + n2;
            if (operator === '-') calculationResult = n1 - n2;
            if (operator === '*') calculationResult = n1 * n2;
            if (operator === '/') {
                if (n2 === 0) {
                    outputContainer.classList.remove('active-result');
                    resultDisplay.innerText = "Cannot divide by zero.";
                    resultDisplay.style.color = "#f43f5e";
                    return;
                }
                calculationResult = n1 / n2;
            }

            if (calculationResult % 1 !== 0) {
                calculationResult = parseFloat(calculationResult.toFixed(6));
            }

            resultDisplay.style.color = "#ffffff";
            outputContainer.classList.add('active-result');
            resultDisplay.innerText = calculationResult;
        }

        function clearFields() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            var outputContainer = document.getElementById('outputContainer');
            var resultDisplay = document.getElementById('resultDisplay');
            outputContainer.classList.remove('active-result');
            resultDisplay.style.color = "#cbd5e1";
            resultDisplay.innerText = "Awaiting parameters...";
        }
    </script>
</body>
</html>

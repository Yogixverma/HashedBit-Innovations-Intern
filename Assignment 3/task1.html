<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Assignment 3 — Task 1</title>
    <style>
        body { background: radial-gradient(circle at top, #141b2d 0%, #090d16 100%); color: white; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 20px; padding: 2.5rem; max-width: 540px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        h3 { color: #6366f1; margin: 0 0 1rem 0; font-family: sans-serif; }
        .prompt { color: #e2e8f0; font-size: 1rem; line-height: 1.5; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 0.75rem; background: #09090b; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 1rem; outline: none; box-sizing: border-box; margin-bottom: 1rem; }
        button { background: #4f46e5; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; }
        button:hover { background: #4338ca; }
        .console { background: #04060d; border: 1px solid #1f2937; padding: 1rem; border-radius: 10px; margin-top: 1.5rem; font-family: monospace; color: #34d399; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Question 01 — Array Filter Matrix</h3>
        <p class="prompt">Provide comma-separated Indian states names to filter out all tags starting with vowels dynamically.</p>
        <input type="text" id="t1-input" value="Rajasthan, Assam, Goa, Odisha, Punjab, Bihar, Kerala">
        <button onclick="executeT1()">Filter Vowel States</button>
        <div id="out1" class="console">Awaiting data computation vector...</div>
    </div>
    <script>
        function executeT1() {
            let rawArr = document.getElementById('t1-input').value.split(',').map(s => s.trim());
            let filtered = rawArr.filter(state => {
                if(!state) return false;
                let firstLetter = state.charAt(0).toLowerCase();
                return !['a', 'e', 'i', 'o', 'u'].includes(firstLetter);
            });
            document.getElementById('out1').innerText = `Processed Output Array Array =>\n[${filtered.join(', ')}]`;
        }
    </script>
</body>
</html>

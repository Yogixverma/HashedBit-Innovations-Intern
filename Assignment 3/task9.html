<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Assignment 3 — Task 9</title>
    <style>
        body { background: radial-gradient(circle at top, #141b2d 0%, #090d16 100%); color: white; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 20px; padding: 2.5rem; max-width: 540px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        h3 { color: #6366f1; margin: 0 0 1rem 0; }
        textarea { width: 100%; height: 90px; background: #09090b; border: 1px solid #334155; color: white; border-radius: 8px; padding: 0.75rem; font-size: 1rem; outline: none; margin-bottom: 1rem; box-sizing: border-box; resize: none; }
        button { background: #4f46e5; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; }
        .console { background: #04060d; border: 1px solid #1f2937; padding: 1rem; border-radius: 10px; margin-top: 1.5rem; font-family: monospace; color: #34d399; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Question 09 — Word Analytics Counter</h3>
        <p style="color:#e2e8f0; margin-bottom:1.5rem;">Input full paragraphs block strings to calculate total words spacing metrics split sizing.</p>
        <textarea id="t9-input">The incredible blue city landscape of Jodhpur Rajasthan India</textarea>
        <button onclick="executeT9()">Compute Words Metrics</button>
        <div id="out9" class="console">Awaiting structural payload data analyzer logs...</div>
    </div>
    <script>
        function executeT9() {
            let val = document.getElementById('t9-input').value.trim();
            if(!val) { document.getElementById('out9').innerText = "Word Metrics Count: 0 words."; return; }
            let wordLength = val.split(/\s+/).length;
            document.getElementById('out9').innerText = `Total Calculated Word Length Sizing => ${wordLength} words`;
        }
    </script>
</body>
</html>

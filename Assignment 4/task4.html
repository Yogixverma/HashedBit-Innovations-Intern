<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Task 4 — Dynamic CSS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #060814; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
        .card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 2.5rem; max-width: 580px; width: 100%; }
        h3 { color: #6366f1; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.4rem; margin-top: 0; }
        
        .sandbox { background: white; color: black; padding: 2rem; border-radius: 14px; display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1.5rem; }
        .text-here { font-size: 32px; font-family: sans-serif; color: black; text-decoration: none; font-style: normal; font-weight: normal; text-align: left; transition: all 0.1s; }
        
        input[type="text"] { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; outline: none; }
        .btn-style { padding: 8px 14px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 6px; font-weight: 500; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Task 04: Dynamic CSS Control</h3>
        
        <div class="sandbox">
            <div id="text-container" class="text-here">This is some example text</div>
            
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <input type="text" id="colorbox" placeholder="e.g. #4f46e5 or blue" value="red">
                <button class="btn-style" id="colorchange" onclick="changeColor()">Change Colour</button>
            </div>

            <div style="display: flex; flex-direction: column; gap: 0.25rem; width: 240px;">
                <label style="font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase;">Font Size Slider</label>
                <input type="range" id="fontsize" min="16" max="70" value="32" oninput="changeFontSize(this.value)">
            </div>

            <div style="display: flex; gap: 0.4rem; flex-wrap: wrap;">
                <button class="btn-style" onclick="toggleStyle('fontStyle', 'italic', 'normal')">Italics</button>
                <button class="btn-style" onclick="toggleStyle('textDecoration', 'underline', 'none')">Underline</button>
                <button class="btn-style" onclick="toggleStyle('fontWeight', 'bold', 'normal')">Bold</button>
                
                <select id="fontFamilySelect" class="btn-style" onchange="changeFontFamily(this.value)">
                    <option value="sans-serif">Sans-Serif</option>
                    <option value="serif">Serif</option>
                    <option value="monospace">Monospace</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        // JSFIDDLE TARGET JAVASCRIPT FUNCTIONS
        function changeColor() {
            const txtContainer = document.getElementById('text-container');
            const colorVal = document.getElementById('colorbox').value;
            txtContainer.style.color = colorVal;
        }

        function changeFontSize(size) {
            const txtContainer = document.getElementById('text-container');
            txtContainer.style.fontSize = size + "px";
        }

        function toggleStyle(property, activeValue, normalValue) {
            const txtContainer = document.getElementById('text-container');
            if (txtContainer.style[property] === activeValue) {
                txtContainer.style[property] = normalValue;
            } else {
                txtContainer.style[property] = activeValue;
            }
        }

        function changeFontFamily(font) {
            const txtContainer = document.getElementById('text-container');
            txtContainer.style.fontFamily = font;
        }
    </script>
</body>
</html>
